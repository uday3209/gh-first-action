# test --> build --> deploy

name: main Pipeline
on:
    push:
        branches:
            - main
    
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: install node and dependencies
              uses: actions/setup-node@v6
              with:
                node-version: '18'
            - name: install dependencies
              run: npm ci
            - name: run tests
              run: npm run test
        
    build:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: install node and dependencies
              uses: actions/setup-node@v6
              with:
                node-version: '18'
            - name: install dependencies
              run: npm ci
            - name: build project
              run: npm run build
        
    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: deploy project
              run: echo "deploying.." |
                npm run dev
            


         
