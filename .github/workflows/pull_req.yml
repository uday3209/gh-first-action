name: Pull req gh
on: 
  pull_request:
    types:
     - opened
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: output event data
        run: echo "$ {{ toJSON(github) }}"
        
      - name: get code
        uses: actions/checkout@v3

      - name: install node
        uses: actions/setup-node@v3
        with: 
            node-version: '18'
            cache: 'npm'
    
      - name: install dependencies
        run: npm ci

      - name: run tests
        run: npm test

      - name: build project
        run: npm run build

      - name: deploy to prod
        run: echo "Deploying this to prod"
